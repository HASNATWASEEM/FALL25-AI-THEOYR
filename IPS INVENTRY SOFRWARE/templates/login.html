<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPS Inventory - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(rgba(0, 74, 153, 0.7), rgba(0, 51, 102, 0.8)), 
                        url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            margin: 0;
        }
        .login-card {
            width: 420px;
            background: rgba(255, 255, 255, 0.95);
            padding: 45px;
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-align: center;
        }
        /* Logo Size Fix */
        .ips-logo { height: 70px; width: auto; margin-bottom: 20px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); object-fit: contain; }
        .form-control {
            border-radius: 12px;
            padding: 12px 20px;
            border: 1px solid #ddd;
            background: #f8f9fa;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            box-shadow: 0 0 12px rgba(0, 74, 153, 0.2);
            border-color: #004a99;
            background: white;
        }
        .btn-ips {
            background: linear-gradient(45deg, #004a99, #003366);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            margin-top: 15px;
        }
        .btn-ips:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 74, 153, 0.4);
            color: white;
            filter: brightness(1.1);
        }
        .register-link { color: #004a99; font-weight: 600; text-decoration: none; }
        .register-link:hover { text-decoration: underline; }
        .brand-title { font-size: 1.5rem; letter-spacing: 2px; color: #333; }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="{{ url_for('static', filename='image/logo.png') }}" alt="IPS Logo" class="ips-logo">
        <h3 class="fw-bold brand-title mb-1">IPS INVENTORY</h3>
        <p class="text-secondary small mb-4">Secure Administrator Access</p>
        
        <form method="POST">
            <div class="mb-3 text-start">
                <label class="form-label small fw-bold ms-2">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
            </div>
            <div class="mb-4 text-start">
                <label class="form-label small fw-bold ms-2">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-ips w-100">SECURE LOGIN</button>
        </form>

        <p class="mt-4 text-muted small">
            Account nahi bana hua? <a href="/signup" class="register-link">Register Here</a>
        </p>
    </div>

</body>
</html>
