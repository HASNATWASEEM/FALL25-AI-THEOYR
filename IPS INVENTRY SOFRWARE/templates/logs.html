<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Logs - IPS Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Poppins', sans-serif; }
        .log-container { margin-top: 50px; max-width: 900px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .table thead { background-color: #004a99; color: white; }
        .btn-back { border-radius: 20px; padding: 5px 20px; }
        .badge-user { background-color: #e7f1ff; color: #004a99; font-weight: 600; }
    </style>
</head>
<body>

<div class="container log-container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-primary fw-bold mb-0">Staff Activity Logs</h2>
        <a href="/" class="btn btn-outline-secondary btn-back">← Back to Inventory</a>
    </div>

    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead>
                <tr>
                    <th>Time Stamp</th>
                    <th>User / Staff</th>
                    <th>Action Performed</th>
                </tr>
            </thead>
            <tbody>
                {% for log in logs %}
                <tr>
                    <td class="text-muted small">{{ log.time }}</td>
                    <td><span class="badge badge-user">{{ log.user }}</span></td>
                    <td class="fw-medium">{{ log.action }}</td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="3" class="text-center text-muted p-4">No activity recorded yet.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
