<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPS Inventory - Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(rgba(0, 74, 153, 0.7), rgba(0, 51, 102, 0.8)), 
                        url('https://images.unsplash.com/photo-1542838132-92c53300491e?auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            margin: 0;
        }
        .signup-card {
            width: 420px;
            background: rgba(255, 255, 255, 0.95);
            padding: 45px;
            border-radius: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-align: center;
        }
        .ips-logo { max-width: 140px; margin-bottom: 20px; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.1)); }
        .form-control, .form-select {
            border-radius: 12px;
            padding: 12px 20px;
            border: 1px solid #ddd;
            background: #f8f9fa;
            transition: all 0.3s ease;
        }
        .form-control:focus, .form-select:focus {
            box-shadow: 0 0 10px rgba(0, 74, 153, 0.2);
            border-color: #004a99;
            background: white;
        }
        .btn-ips {
            background: linear-gradient(45deg, #004a99, #003366);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            transition: transform 0.2s ease;
            margin-top: 10px;
        }
        .btn-ips:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 74, 153, 0.4);
            color: white;
        }
        .login-link { color: #004a99; font-weight: 600; text-decoration: none; }
        .login-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="signup-card">
        <img src="https://share.google/Tg8mo1ykh82ONS2qg" alt="IPS Logo" class="ips-logo">
        <h3 class="fw-bold mb-1 text-dark">IPS INVENTORY</h3>
        <p class="text-secondary small mb-4">Create account to manage stock</p>
        
        <form method="POST">
            <div class="mb-3 text-start">
                <label class="form-label small fw-bold ms-2">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Choose a username" required>
            </div>
            
            <div class="mb-3 text-start">
                <label class="form-label small fw-bold ms-2">Account Type (Role)</label>
                <select name="role" class="form-select" required>
                    <option value="Staff" selected>STAFF OR CUSTOMER</option>
                    <option value="Manager">ADMIN</option>
                </select>
                <div class="form-text ms-2 small">Manager can add/delete stock.</div>
            </div>

            <div class="mb-4 text-start">
                <label class="form-label small fw-bold ms-2">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Create a strong password" required>
            </div>
            <button type="submit" class="btn btn-ips w-100">CREATE ACCOUNT</button>
        </form>

        <p class="mt-4 text-muted small">
            Pehle se account hai? <a href="/login" class="login-link">Login Karein</a>
        </p>
    </div>

</body>
</html>
